<!DOCTYPE html>
<html>
<head>
  <title>LPG Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      background: #e46c2b;
    }

    .navbar-brand {
      color: #fff;
      font-weight: bold;
    }

    .profile {
      color: #fff;
    }

    /* CARD */
    .card-box {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 15px;
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .btn-main {
      background: #16a34a;
      color: white;
      border-radius: 8px;
      padding: 10px;
      font-weight: 500;
    }

    .btn-main:hover {
      background: #15803d;
    }

    /* LOADER */
    .loader {
      display: none;
      text-align: center;
      margin-top: 10px;
    }

    .spinner-border {
      width: 2rem;
      height: 2rem;
    }

    /* TIMELINE */
    .timeline {
      margin-top: 20px;
      padding-left: 20px;
      border-left: 3px solid #ccc;
    }

    .timeline-step {
      margin-bottom: 15px;
      position: relative;
    }

    .timeline-step::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 5px;
      width: 12px;
      height: 12px;
      background: #ccc;
      border-radius: 50%;
    }

    .active-step::before {
      background: #16a34a;
    }

    .active-step {
      font-weight: bold;
      color: #16a34a;
    }

    /* BOOKING CARD */
    .booking-card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: #f8fafc;
    }

    .badge-status {
      background: #e0f2fe;
      color: #0369a1;
      padding: 5px 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<!--  NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🔥 LPG Smart</a>

    <div class="d-flex ms-auto">
      <span id="username" class="text-white me-3"></span>

      <a href="login.html" id="loginBtn" class="btn btn-light me-2">Login</a>
      <a href="signup.html" id="signupBtn" class="btn btn-light me-2">Signup</a>
      <button onclick="logout()" id="logoutBtn" class="btn btn-danger" style="display:none;">Logout</button>
    </div>
  </div>
</nav>


<!--  MAIN CARD -->
<div class="card-box">

  <h4 class="text-center mb-3">🚀 Book LPG Cylinder</h4>

  <input id="address" class="form-control mb-3" placeholder="Enter Delivery Address">

  <button onclick="bookLPG()" id="bookBtn" class="btn btn-main w-100">
    Book LPG
  </button>

  <!-- 🔄 LOADER -->
  <div class="loader" id="loader">
    <div class="spinner-border text-success"></div>
    <p>Processing booking...</p>
  </div>

  <!-- 📦 RESULT -->
  <div id="result"></div>


</div>


<script src="js/booking.js"></script>
<script src="js/home.js"></script>

</body>
</html>
