<!DOCTYPE html>
<html>
<head>
  <title>LPG Smart System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #fdfcfb, #e2d1c3);
      font-family: 'Segoe UI', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      background: #f4a261;
    }

    .navbar-brand {
      color: white;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-top: 60px;
    }

    .hero h1 {
      font-weight: 700;
      color: #333;
    }

    .hero p {
      color: #555;
    }

    /* CARD */
    .container-box {
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
    }

    .btn-main {
      background: #f4a261;
      border: none;
      border-radius: 8px;
      padding: 10px;
      color: white;
      font-weight: 500;
    }

    .btn-main:hover {
      background: #e76f51;
    }

    .card {
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🔥 LPG Smart</a>

    <div class="d-flex ms-auto">
      <span id="username" class="text-white me-3"></span>

      <a href="login.html" id="loginBtn" class="btn btn-light me-2">Login</a>
      <a href="signup.html" id="signupBtn" class="btn btn-light me-2">Signup</a>
      <button onclick="logout()" id="logoutBtn" class="btn btn-danger" style="display:none;">Logout</button>
    </div>
  </div>
</nav>

<!-- 🔥 HERO -->
<div class="hero">
  <h1>🚀 LPG Smart Distribution</h1>
  <p>Book cylinders easily. Track delivery. Stay safe.</p>
</div>

<!-- 🔥 SEARCH BOX -->
<div class="container-box">

  <h4 class="text-center mb-3">Find Nearby Distributors</h4>

  <input id="address" class="form-control mb-3" placeholder="Enter your city (e.g. Bhubaneswar)">

  <button onclick="findDistributors()" class="btn btn-main w-100">
    🔍 Find Distributors
  </button>

  <div id="distributors" class="mt-4"></div>

</div>

<script src="js/distributor.js"></script>
<script src="js/home.js"></script>

</body>
</html>
