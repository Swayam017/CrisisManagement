<!DOCTYPE html>
<html>
<head>
  <title>KYC Verification</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; }
    .box {
      max-width: 500px;
      margin: 80px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  

<div class="box">
  <h3>📝 Complete KYC</h3>

  <input id="phone" class="form-control mb-2" placeholder="Phone Number">
  <input id="address" class="form-control mb-2" placeholder="Address">

  <select id="idType" class="form-control mb-2">
    <option value="Aadhar">Aadhar</option>
    <option value="PAN">PAN</option>
  </select>

  <input id="idNumber" class="form-control mb-3" placeholder="ID Number">

  <button onclick="submitKYC()" class="btn btn-primary w-100">
    Submit KYC
  </button>
</div>

<script src="js/kyc.js"></script>

</body>
</html>
