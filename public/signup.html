<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #fdfcfb, #e2d1c3);
      font-family: 'Segoe UI', sans-serif;
    }

    .navbar {
      background: #f4a261;
    }

    .navbar-brand {
      color: white;
      font-weight: bold;
    }

    .container-box {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h3 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
      color: #333;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
    }

    .form-control:focus {
      border-color: #f4a261;
      box-shadow: 0 0 5px rgba(244,162,97,0.5);
    }

    .btn-main {
      background: #f4a261;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 500;
      color: white;
      transition: 0.3s;
    }

    .btn-main:hover {
      background: #e76f51;
    }

    .link-text {
      text-align: center;
      margin-top: 10px;
    }

    a {
      color: #e76f51;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🔥 LPG Smart</a>
  </div>
</nav>

<div class="container-box">

  <h3>Create Account 🚀</h3>

  <input id="name" class="form-control mb-3" placeholder="Name">

  <input id="email" class="form-control mb-3" placeholder="Email">

  <input id="password" type="password" class="form-control mb-3" placeholder="Password">

  <button onclick="signup()" class="btn btn-main w-100">Sign Up</button>

  <p class="link-text">
    Already have an account? <a href="/login.html">Login</a>
  </p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
